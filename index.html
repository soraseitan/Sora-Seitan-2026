<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生誕カンパ</title>

<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(135deg,#fff0f7,#ffe4f1);
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#ff4fa3;
    margin-bottom:10px;
    font-size:32px;
}

p{
    color:#666;
    margin-bottom:30px;
}

.btn{
    display:block;
    text-decoration:none;
    background:linear-gradient(45deg,#ff4fa3,#ff87c5);
    color:white;
    padding:16px;
    margin-top:15px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    transition:0.2s;
    box-shadow:0 5px 15px rgba(255,79,163,0.3);
}

.btn:hover{
    transform:scale(1.03);
}

.note{
    margin-top:25px;
    font-size:13px;
    color:#999;
}
</style>

</head>

<body>

<div class="card">

<h1>🎀 生誕カンパ 🎀</h1>

<p>
ご支援いただけると嬉しいです！
</p>

<a class="btn" href="https://qr.paypay.ne.jp/p2p01_3qy1QnbeOlXk8S1I">
500円 支援
</a>

<a class="btn" href="https://qr.paypay.ne.jp/p2p01_L0ZCdoGXAepdVTrY">
1000円 支援
</a>

<a class="btn" href="https://qr.paypay.ne.jp/p2p01_QneVEEULRQQZNHUh">
3000円 支援
</a>

<a class="btn" href="https://qr.paypay.ne.jp/p2p01_iCHQ9zKoAA4rjkpb">
5000円 支援
</a>

<a class="btn" href="https://qr.paypay.ne.jp/p2p01_tlv1TTlkDmB0FMag">
10000円 支援
</a>

<div class="note">
ありがとうございます🩷
</div>

</div>

</body>
</html>
