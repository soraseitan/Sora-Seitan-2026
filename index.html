<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生誕カンパ</title>

<style>

body{
    margin:0;
    padding:40px 15px;
    background:linear-gradient(135deg,#fff0f7,#ffe4f1);
    font-family:sans-serif;
    display:flex;
    justify-content:center;
}

.card{
    background:white;
    width:100%;
    max-width:500px;
    padding:30px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
}

h1{
    color:#ff4fa3;
    font-size:34px;
    margin-bottom:10px;
}

.top-text{
    color:#666;
    margin-bottom:35px;
    line-height:1.7;
}

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.wide{
    grid-column:1 / 3;
}

.plan{
    text-decoration:none;
    background:linear-gradient(180deg,#f7d4ff,#eebdff);
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:.2s;
    color:#222;
}

.plan:hover{
    transform:translateY(-3px);
}

/* 金額 */
.price{
    padding:16px;
    font-size:32px;
    font-weight:bold;
    color:#7b1fa2;
    border-bottom:2px solid rgba(255,255,255,0.7);
}

/* 説明 */
.detail{
    background:white;
    padding:18px 10px;
}

.main{
    font-size:20px;
    font-weight:bold;
    margin-bottom:8px;
}

.sub{
    font-size:13px;
    color:#888;
    line-height:1.5;
}

.note{
    margin-top:30px;
    color:#999;
    font-size:13px;
    line-height:1.6;
}

</style>
</head>

<body>

<div class="card">

<h1>🎀 萩田そら生誕カンパ 🎀</h1>

<div class="top-text">
ご覧いただきありがとうございます！<br>
ご協力お願いします
</div>

<div class="detail">

<div class="sub">
とっても嬉しいです🫶
</div>
</div>

<!-- 1000 -->

</div>

<!-- 3000 -->

<div class="detail">
<div class="main">アルバム氏名記載（大）</div>

</div>

<!-- 5000 -->

<div class="detail">

</html>
